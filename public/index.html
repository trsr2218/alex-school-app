<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VFU E-Learning Classroom</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="sidebar" aria-label="Primary">
        <a class="brand" href="#dashboard" data-route="dashboard" aria-label="VFU dashboard">
          <span class="brand-mark">V</span>
          <span>
            <strong>VFU</strong>
            <small>E-Learning Classroom</small>
          </span>
        </a>

        <nav class="nav-list" id="navList"></nav>

        <section class="session-panel" id="sessionPanel" aria-label="Active session"></section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="termLabel">June 2026 Semester</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <label class="search">
              <span aria-hidden="true">/</span>
              <input id="searchInput" type="search" placeholder="Search courses, assignments, discussions">
            </label>
            <div class="theme-switch" id="themeSwitch" role="group" aria-label="Theme">
              <button class="theme-dot theme-dot-dark" type="button" data-theme-set="dark" title="Dark theme"></button>
              <button class="theme-dot theme-dot-light" type="button" data-theme-set="light" title="Light theme"></button>
              <button class="theme-dot theme-dot-ocean" type="button" data-theme-set="ocean" title="Ocean theme"></button>
            </div>
            <button class="icon-button" id="notificationButton" title="Notifications" type="button">
              <span aria-hidden="true" data-icon="bell"></span>
              <span class="badge" id="notificationCount">0</span>
            </button>
            <div class="profile" id="profileCard"></div>
          </div>
        </header>

        <section class="notice-stack" id="noticeStack" aria-live="polite"></section>
        <section id="viewRoot" class="view-root"></section>
      </main>
    </div>

    <script src="state.js"></script>
    <script src="app.js"></script>
  </body>
</html>
